<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الأدمن | ريم الخليج</title>
  <style>
    body {margin:0;font-family:"Cairo",sans-serif;background:#fff8ea;color:#1f2937;}
    .shell {max-width:1100px;margin:20px auto;padding:0 16px;}
    .card {background:#fff;border:1px solid #e5d7bf;border-radius:16px;padding:16px;box-shadow:0 8px 18px rgba(0,0,0,.05);}
    .row {display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    button {padding:10px 14px;border-radius:999px;border:0;font-weight:700;cursor:pointer;}
    .primary {background:#b91c1c;color:#fff;}
    .light {background:#fff;border:1px solid #e5d7bf;}
    input, textarea {width:100%;padding:10px;border:1px solid #d1d5db;border-radius:12px;font:inherit;}
    textarea {min-height:120px;}
    .grid {display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));}
    .muted {color:#6b7280;font-size:.9rem;}
    #status,#authError {min-height:22px;font-weight:700;}
    #authError {color:#b91c1c;}
    #status {color:#166534;}
    .list {display:grid;gap:10px;max-height:60vh;overflow:auto;}
    .item {padding:10px;border:1px solid #e5d7bf;border-radius:14px;background:#fffcf5;}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const js = document.getElementById("jsStatus");
      if (js) js.textContent = "JS: on (early)";
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body>
  <div class="shell">
    <div class="card" id="authCard">
      <div class="row" style="justify-content:space-between;">
        <h2 style="margin:0;">دخول لوحة الأدمن</h2>
        <span class="muted">نسخة: 2026-03-16-1</span>
      </div>
      <p class="muted" id="jsStatus">JS: off</p>
      <input id="adminPassword" type="password" placeholder="الرقم السري" aria-label="الرقم السري" />
      <div class="row">
        <button id="loginBtn" class="primary" type="button">دخول</button>
        <button id="forceLocal" class="light" type="button">تخطي Supabase</button>
      </div>
      <div id="debugLog" class="muted"></div>
      <div id="authError"></div>
    </div>

    <div class="card" id="appCard" style="display:none;">
      <div class="row" style="justify-content:space-between;">
        <h2 style="margin:0;">المشاريع</h2>
        <button id="logoutBtn" class="light" type="button">تسجيل خروج</button>
      </div>

      <div class="grid">
        <div>
          <label>عدد المشاريع</label>
          <input id="projectLimit" type="number" min="1" max="200" value="50" />
        </div>
        <div>
          <label>الصور لكل مشروع</label>
          <input id="imagesPerProject" type="number" min="1" max="50" value="15" />
        </div>
      </div>

      <h3>إضافة / تعديل مشروع</h3>
      <input id="title" placeholder="اسم المشروع" />
      <input id="location" placeholder="الموقع" />
      <textarea id="images" placeholder="رابط في كل سطر"></textarea>
      <div class="row">
        <button id="saveProjectBtn" class="primary" type="button">حفظ المشروع</button>
        <button id="clearFormBtn" class="light" type="button">تفريغ الحقول</button>
        <button id="saveAllBtn" class="primary" type="button">حفظ الكل</button>
      </div>

      <div id="status"></div>

      <h3>قائمة المشاريع</h3>
      <div id="stats" class="muted"></div>
      <div id="projectsList" class="list"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://tivrcukgaqcxmwrgfzde.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_h7zB-t1tyt0wnlLxDz6wPw_QGBWpxJM";
    const ADMIN_PASSWORD = "admin123";
    const ADMIN_AUTH_KEY = "REEM_ADMIN_AUTH_V1";

    const debugLog = document.getElementById("debugLog");
    const log = (m) => { debugLog.textContent = m; console.log(m); };
    document.getElementById("jsStatus").textContent = "JS: on";

    let supabase = null;
    let state = { projectLimit: 50, imagesPerProject: 15, projects: [] };
    let editIndex = -1;

    const el = {
      authCard: document.getElementById("authCard"),
      appCard: document.getElementById("appCard"),
      authError: document.getElementById("authError"),
      loginBtn: document.getElementById("loginBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      forceLocal: document.getElementById("forceLocal"),
      projectLimit: document.getElementById("projectLimit"),
      imagesPerProject: document.getElementById("imagesPerProject"),
      title: document.getElementById("title"),
      location: document.getElementById("location"),
      images: document.getElementById("images"),
      saveProjectBtn: document.getElementById("saveProjectBtn"),
      clearFormBtn: document.getElementById("clearFormBtn"),
      saveAllBtn: document.getElementById("saveAllBtn"),
      status: document.getElementById("status"),
      projectsList: document.getElementById("projectsList"),
      stats: document.getElementById("stats"),
    };

    function showApp() { el.authCard.style.display = "none"; el.appCard.style.display = "block"; }
    function showAuth(msg = "") { el.appCard.style.display = "none"; el.authCard.style.display = "block"; if (msg) el.authError.textContent = msg; }
    function setStatus(msg, err=false){ el.status.textContent = msg; el.status.style.color = err ? "#b91c1c" : "#166534"; }
    function parseImages(text){ return text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean); }
    function renderList(){
      el.projectsList.innerHTML = "";
      el.stats.textContent = `إجمالي المشاريع: ${state.projects.length}`;
      state.projects.forEach((p,i)=>{
        const div=document.createElement("div");
        div.className="item";
        div.innerHTML=`<b>${p.title||"بدون عنوان"}</b><br><span class=\"muted\">${p.location||"بدون موقع"} | صور: ${(p.images||[]).length}</span><div class=\"row\" style=\"margin-top:8px;\"><button class=\"light\" data-edit=\"${i}\" type=\"button\">تعديل</button><button class=\"primary\" data-delete=\"${i}\" type=\"button\" style=\"background:#991b1b;\">حذف</button></div>`;
        el.projectsList.appendChild(div);
      });
    }

    async function loadRemote(){
      if(!window.supabase) { log("مكتبة Supabase غير محمّلة"); return false; }
      supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
      const { data: settings, error: sErr } = await supabase.from("settings").select("*").eq("id",1).maybeSingle();
      if(sErr) { log("خطأ settings:"+sErr.message); return false; }
      state.projectLimit = Number(settings?.project_limit)||50;
      state.imagesPerProject = Number(settings?.images_per_project)||15;
      const { data: projects, error: pErr } = await supabase.from("projects").select("*").order("sort_order",{ascending:true}).order("created_at",{ascending:true});
      if(pErr) { log("خطأ projects:"+pErr.message); return false; }
      state.projects = (projects||[]).map(p=>({id:p.id,title:p.title,location:p.location,images:Array.isArray(p.images)?p.images:[]}));
      return true;
    }

    async function saveSettings(){ if(!supabase) return; await supabase.from("settings").upsert({id:1,project_limit:state.projectLimit,images_per_project:state.imagesPerProject},{onConflict:"id"}); }

    async function addOrUpdate(){
      const title=el.title.value.trim();
      const location=el.location.value.trim();
      const images=parseImages(el.images.value);
      if(!title) { setStatus("اكتب اسم المشروع",true); return; }
      if(images.length===0){ setStatus("أضف رابط صورة واحد على الأقل",true); return; }
      const payload={title,location,images};
      if(editIndex>=0){
        const current=state.projects[editIndex];
        state.projects[editIndex]={...current,...payload};
        if(supabase && current?.id){ await supabase.from("projects").update(payload).eq("id",current.id); }
      } else {
        let insertedId=null;
        if(supabase){
          const {data}=await supabase.from("projects").insert({...payload,sort_order:state.projects.length}).select().single();
          insertedId=data?.id||null;
        }
        state.projects.push({...payload,id:insertedId});
      }
      editIndex=-1;
      el.saveProjectBtn.textContent="حفظ المشروع";
      setStatus("تم الحفظ");
      renderList();
    }

    el.loginBtn.onclick = async () => {
      const pass = document.getElementById("adminPassword").value;
      if(pass !== ADMIN_PASSWORD){ el.authError.textContent = "الرقم السري غير صحيح"; return; }
      localStorage.setItem(ADMIN_AUTH_KEY,"ok");
      el.authError.textContent = "";
      const ok = await loadRemote();
      if(!ok) log("العمل بالوضع المحلي فقط");
      el.projectLimit.value = state.projectLimit;
      el.imagesPerProject.value = state.imagesPerProject;
      renderList();
      showApp();
    };

    el.forceLocal.onclick = () => { showApp(); log("تم التخطي للوضع المحلي"); };
    el.logoutBtn.onclick = () => { localStorage.removeItem(ADMIN_AUTH_KEY); showAuth(); };
    el.clearFormBtn.onclick = () => { editIndex=-1; el.title.value=""; el.location.value=""; el.images.value=""; el.saveProjectBtn.textContent="حفظ المشروع"; };
    el.saveProjectBtn.onclick = addOrUpdate;
    el.saveAllBtn.onclick = async () => {
      state.projectLimit = Number(el.projectLimit.value)||50;
      state.imagesPerProject = Number(el.imagesPerProject.value)||15;
      await saveSettings();
      setStatus("تم حفظ الإعدادات");
    };
    el.projectsList.onclick = async (e)=>{
      const edit=e.target.getAttribute("data-edit");
      const del=e.target.getAttribute("data-delete");
      if(edit){
        editIndex=Number(edit);
        const p=state.projects[editIndex];
        el.title.value=p.title||""; el.location.value=p.location||""; el.images.value=(p.images||[]).join("\n");
        el.saveProjectBtn.textContent="تحديث المشروع";
      }
      if(del){
        const idx=Number(del);
        const p=state.projects[idx];
        state.projects.splice(idx,1);
        if(supabase && p?.id){ await supabase.from("projects").delete().eq("id",p.id); }
        renderList();
      }
    };

    if(localStorage.getItem(ADMIN_AUTH_KEY)==="ok"){
      el.loginBtn.click();
    }
  </script>
</body>
</html>
